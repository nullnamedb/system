<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullName DB - Database Manager</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/ui/base.css">
    <style>
        .db-manager {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .db-sidebar {
            width: 300px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .db-sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border-primary);
        }

        .db-search {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border-primary);
        }

        .db-search input {
            width: 100%;
            padding: 0.5rem;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            color: var(--text-primary);
        }

        .db-tree {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .db-tree-item {
            padding: 0.5rem;
            cursor: pointer;
            border-radius: var(--radius-md);
            margin: 2px 0;
        }

        .db-tree-item:hover {
            background: var(--bg-hover);
        }

        .db-tree-item.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-primary);
        }

        .db-tree-database {
            font-weight: 600;
            color: var(--accent-primary);
        }

        .db-tree-table {
            margin-left: 1.5rem;
        }

        .db-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .db-toolbar {
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .db-content {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }

        .data-table-container {
            overflow-x: auto;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-primary);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .data-table th {
            text-align: left;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-primary);
            color: var(--accent-primary);
            position: sticky;
            top: 0;
        }

        .data-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border-secondary);
        }

        .data-table tr:hover {
            background: var(--bg-hover);
        }

        .actions-column {
            width: 100px;
            text-align: center;
        }

        .edit-btn { color: var(--accent-primary); background: none; border: none; cursor: pointer; }
        .delete-btn { color: var(--accent-error); background: none; border: none; cursor: pointer; }

        .query-panel {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-primary);
            margin-bottom: 1rem;
        }

        .query-panel-header {
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
        }

        .query-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            color: var(--text-primary);
            font-family: monospace;
            resize: vertical;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            max-width: 500px;
            width: 90%;
        }

        .modal-header, .modal-footer {
            padding: 1rem;
            border-bottom: 1px solid var(--border-primary);
        }

        .modal-footer {
            border-bottom: none;
            border-top: 1px solid var(--border-primary);
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .modal-body { padding: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-size: 0.8rem; }
        .form-group input { width: 100%; padding: 0.5rem; background: var(--bg-input); border: 1px solid var(--border-primary); border-radius: var(--radius-md); color: var(--text-primary); }

        @media (max-width: 768px) {
            .db-sidebar { position: fixed; left: 0; top: 0; height: 100%; z-index: 100; transform: translateX(-100%); }
            .db-sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <div class="db-manager">
        <aside class="db-sidebar" id="dbSidebar">
            <div class="db-sidebar-header"><h3><i class="fa fa-database"></i> Databases</h3></div>
            <div class="db-search"><input type="text" id="dbSearch" placeholder="Search..."></div>
            <div class="db-tree" id="dbTree"><div style="text-align:center;padding:2rem;">Loading...</div></div>
        </aside>

        <main class="db-main">
            <div class="db-toolbar">
                <button class="menu-toggle" id="menuToggle" style="display:none;"><i class="fa fa-bars"></i></button>
                <button id="refreshBtn" class="btn"><i class="fa fa-refresh"></i> Refresh</button>
                <button id="createDatabaseBtn" class="btn"><i class="fa fa-plus"></i> New DB</button>
                <button id="createTableBtn" class="btn" style="display:none;"><i class="fa fa-table"></i> New Table</button>
                <button id="addRecordBtn" class="btn" style="display:none;"><i class="fa fa-plus"></i> Add Record</button>
                <button id="runSqlBtn" class="btn btn-primary"><i class="fa fa-play"></i> Run SQL</button>
            </div>

            <div class="db-content" id="dbContent">
                <div id="welcomeScreen" style="text-align:center;padding:3rem;">
                    <i class="fa fa-database" style="font-size:4rem;opacity:0.5;"></i>
                    <h3>Database Manager</h3>
                    <p>Select a database from the left panel</p>
                    <button id="welcomeCreateDbBtn" class="btn btn-primary">Create Database</button>
                </div>

                <div id="dataView" style="display:none;">
                    <div class="query-panel">
                        <div class="query-panel-header"><span><i class="fa fa-terminal"></i> SQL Query</span></div>
                        <div style="padding:1rem;">
                            <textarea id="sqlQueryInput" class="query-input" rows="3" placeholder="SELECT * FROM users"></textarea>
                            <div style="margin-top:0.5rem;display:flex;gap:0.5rem;">
                                <button id="executeQueryBtn" class="btn btn-primary">Execute</button>
                                <button id="clearQueryBtn" class="btn">Clear</button>
                            </div>
                            <div id="queryResult" style="margin-top:1rem;display:none;"></div>
                        </div>
                    </div>
                    <div class="data-table-container" id="dataTableContainer">Loading...</div>
                </div>
            </div>

            <div class="db-statusbar"><span id="dbStatus">Ready</span><span id="dbInfo">-</span></div>
        </main>
    </div>

    <div id="createDbModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header"><h3>Create Database</h3><button class="modal-close">&times;</button></div>
            <div class="modal-body"><input type="text" id="newDbName" placeholder="Database name" style="width:100%;padding:0.5rem;"></div>
            <div class="modal-footer"><button id="createDbConfirm" class="btn btn-primary">Create</button><button class="modal-cancel btn">Cancel</button></div>
        </div>
    </div>

    <div id="recordModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header"><h3 id="recordModalTitle">Add Record</h3><button class="modal-close">&times;</button></div>
            <div class="modal-body" id="recordModalBody"></div>
            <div class="modal-footer"><button id="saveRecordBtn" class="btn btn-primary">Save</button><button class="modal-cancel btn">Cancel</button></div>
        </div>
    </div>

    <script src="/ui/session.js"></script>
    <script>
        let currentDatabase = null, currentTable = null;

        function getSession() { return localStorage.getItem('nullname_session'); }
        async function apiRequest(query) { const res = await fetch(`/q?q=${encodeURIComponent(query)}&ses=${getSession()}`); return res.json(); }

        async function loadDatabaseTree() {
            const data = await apiRequest('get.');
            const treeDiv = document.getElementById('dbTree');
            treeDiv.innerHTML = '';
            for (const [db, tables] of Object.entries(data)) {
                const dbDiv = document.createElement('div');
                dbDiv.className = 'db-tree-item db-tree-database';
                dbDiv.innerHTML = `<i class="fa fa-database"></i> ${db}`;
                dbDiv.onclick = () => selectDatabase(db);
                treeDiv.appendChild(dbDiv);
                if (tables && typeof tables === 'object') {
                    const tablesDiv = document.createElement('div');
                    tablesDiv.style.marginLeft = '1.5rem';
                    for (const table of Object.keys(tables)) {
                        const tableDiv = document.createElement('div');
                        tableDiv.className = 'db-tree-item db-tree-table';
                        tableDiv.innerHTML = `<i class="fa fa-table"></i> ${table}`;
                        tableDiv.onclick = (e) => { e.stopPropagation(); selectTable(db, table); };
                        tablesDiv.appendChild(tableDiv);
                    }
                    treeDiv.appendChild(tablesDiv);
                }
            }
        }

        async function selectDatabase(db) {
            currentDatabase = db;
            currentTable = null;
            document.getElementById('createTableBtn').style.display = 'inline-flex';
            document.getElementById('addRecordBtn').style.display = 'none';
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('dataView').style.display = 'flex';
            document.getElementById('dataTableContainer').innerHTML = '<div style="padding:2rem;text-align:center;">Loading tables...</div>';
            const data = await apiRequest(`get.${db}`);
            renderTablesList(data);
        }

        function renderTablesList(tables) {
            const container = document.getElementById('dataTableContainer');
            if (!tables || Object.keys(tables).length === 0) {
                container.innerHTML = '<div style="padding:2rem;text-align:center;">No tables. Click "New Table".</div>';
                return;
            }
            let html = '<table class="data-table"><thead><tr><th>Table</th><th>Records</th><th>Actions</th></tr></thead><tbody>';
            for (const [table, data] of Object.entries(tables)) {
                const count = data && typeof data === 'object' ? Object.keys(data).filter(k=>!isNaN(k)).length : 0;
                html += `<tr><td>${table}</td><td>${count}</td><td><button class="edit-btn" onclick="selectTable('${currentDatabase}','${table}')">Browse</button> <button class="delete-btn" onclick="deleteTable('${currentDatabase}','${table}')">Drop</button></td></tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        window.selectTable = async function(db, table) {
            currentDatabase = db; currentTable = table;
            document.getElementById('addRecordBtn').style.display = 'inline-flex';
            const data = await apiRequest(`get.${db}.${table}`);
            renderTableData(data, table);
        };

        function renderTableData(data, table) {
            const container = document.getElementById('dataTableContainer');
            if (!data || Object.keys(data).length === 0) {
                container.innerHTML = '<div style="padding:2rem;text-align:center;">No records. Click "Add Record".</div>';
                return;
            }
            const columns = new Set();
            const records = [];
            for (const [id, row] of Object.entries(data)) {
                if (id === '_nextId') continue;
                records.push({ id, ...row });
                Object.keys(row).forEach(c => columns.add(c));
            }
            let html = '<table class="data-table"><thead><tr><th>ID</th>';
            for (const col of columns) html += `<th>${col}</th>`;
            html += '<th>Actions</th></tr></thead><tbody>';
            for (const rec of records) {
                html += `<tr><td>${rec.id}</td>`;
                for (const col of columns) html += `<td>${rec[col] !== undefined ? rec[col] : ''}</td>`;
                html += `<td><button class="edit-btn" onclick="editRecord('${currentDatabase}','${currentTable}','${rec.id}')">Edit</button> <button class="delete-btn" onclick="deleteRecord('${currentDatabase}','${currentTable}','${rec.id}')">Delete</button></td></tr>`;
            }
            html += '</tbody></table>';
            container.innerHTML = html;
        }

        window.editRecord = async function(db, table, id) {
            const data = await apiRequest(`get.${db}.${table}.${id}`);
            const modal = document.getElementById('recordModal');
            const body = document.getElementById('recordModalBody');
            document.getElementById('recordModalTitle').innerText = 'Edit Record';
            let html = '';
            for (const [key, val] of Object.entries(data[id] || {})) {
                html += `<div class="form-group"><label>${key}</label><input type="text" id="field_${key}" value="${val}"></div>`;
            }
            body.innerHTML = html;
            modal.style.display = 'flex';
            document.getElementById('saveRecordBtn').onclick = async () => {
                for (const [key] of Object.entries(data[id] || {})) {
                    const newVal = document.getElementById(`field_${key}`).value;
                    await apiRequest(`update.${db}.${table}.${id}.${key}=${encodeURIComponent(newVal)}`);
                }
                modal.style.display = 'none';
                selectTable(db, table);
            };
        };

        window.deleteRecord = async function(db, table, id) {
            if (confirm('Delete this record?')) {
                await apiRequest(`delete.${db}.${table}.${id}`);
                selectTable(db, table);
            }
        };

        window.deleteTable = async function(db, table) {
            if (confirm(`Drop table '${table}'?`)) {
                await apiRequest(`delete.${db}.${table}`);
                selectDatabase(db);
                loadDatabaseTree();
            }
        };

        async function createDatabase() {
            const name = document.getElementById('newDbName').value.trim();
            if (name) { await apiRequest(`create.${name}`); loadDatabaseTree(); selectDatabase(name); }
            document.getElementById('createDbModal').style.display = 'none';
        }

        async function executeSQL() {
            const query = document.getElementById('sqlQueryInput').value;
            const result = await apiRequest(query);
            document.getElementById('queryResult').style.display = 'block';
            document.getElementById('queryResult').innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`;
        }

        document.getElementById('refreshBtn').onclick = () => { loadDatabaseTree(); if(currentDatabase) selectDatabase(currentDatabase); };
        document.getElementById('createDatabaseBtn').onclick = () => document.getElementById('createDbModal').style.display = 'flex';
        document.getElementById('welcomeCreateDbBtn').onclick = () => document.getElementById('createDbModal').style.display = 'flex';
        document.getElementById('createTableBtn').onclick = () => alert('Create table feature - use SQL: create.db.table');
        document.getElementById('addRecordBtn').onclick = () => { if(currentTable) editRecord(currentDatabase, currentTable, null); else alert('Select a table first'); };
        document.getElementById('runSqlBtn').onclick = () => document.getElementById('queryResult').style.display = document.getElementById('queryResult').style.display === 'none' ? 'flex' : 'none';
        document.getElementById('executeQueryBtn').onclick = executeSQL;
        document.getElementById('clearQueryBtn').onclick = () => { document.getElementById('sqlQueryInput').value = ''; document.getElementById('queryResult').style.display = 'none'; };
        document.getElementById('createDbConfirm').onclick = createDatabase;
        document.querySelectorAll('.modal-close, .modal-cancel').forEach(btn => btn.onclick = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'));

        loadDatabaseTree();
    </script>
</body>
</html>
