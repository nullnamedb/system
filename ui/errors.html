<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullName DB - Error</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/ui/base.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 1rem;
            background: radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05), transparent 50%), var(--bg-primary);
        }

        .error-container {
            max-width: 550px;
            width: 100%;
            padding: 2rem;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-glass);
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .error-icon i {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-error));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-code {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-error));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .error-message {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .error-details {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1.5rem;
            font-family: var(--font-mono);
            font-size: 0.75rem;
            text-align: left;
            overflow-x: auto;
            display: none;
            border-left: 3px solid var(--accent-error);
        }

        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .error-actions .btn {
            min-width: 120px;
        }

        .error-footer {
            border-top: 1px solid var(--border-primary);
            padding-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }

        .error-footer a {
            color: var(--accent-primary);
            text-decoration: none;
        }

        .error-footer a:hover {
            text-decoration: underline;
        }

        .trace-link {
            cursor: pointer;
            color: var(--accent-primary);
            font-size: 0.8rem;
            display: inline-block;
            margin-top: 0.5rem;
        }

        .trace-link:hover {
            text-decoration: underline;
        }

        .request-id {
            font-family: monospace;
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 1rem;
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 1.5rem;
            }
            .error-code {
                font-size: 3.5rem;
            }
            .error-icon {
                font-size: 3rem;
            }
            .error-title {
                font-size: 1.25rem;
            }
            .error-actions {
                flex-direction: column;
            }
            .error-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon" id="errorIcon">
            <i class="fa fa-exclamation-triangle"></i>
        </div>
        <div class="error-code" id="errorCode">404</div>
        <div class="error-title" id="errorTitle">Page Not Found</div>
        <div class="error-message" id="errorMessage">The page you are looking for does not exist or has been moved.</div>
        <div class="error-details" id="errorDetails"></div>
        <div class="error-actions">
            <a href="/dashboard" class="btn btn-primary"><i class="fa fa-home"></i> Dashboard</a>
            <button onclick="history.back()" class="btn"><i class="fa fa-arrow-left"></i> Go Back</button>
            <button onclick="location.reload()" class="btn"><i class="fa fa-refresh"></i> Retry</button>
        </div>
        <div class="error-footer">
            <div id="timestamp"></div>
            <a href="#" class="trace-link" id="traceLink" style="display:none;">
                <i class="fa fa-code"></i> Show Details
            </a>
            <div style="margin-top: 0.75rem;">
                <a href="/login">Return to Login</a> &nbsp;|&nbsp;
                <a href="https://github.com/nullnamedb/system/issues" target="_blank">Report Issue</a>
            </div>
            <div class="request-id" id="requestId"></div>
        </div>
    </div>

    <script>
        // ============================================
        // Error Page Handler
        // ============================================
        
        const urlParams = new URLSearchParams(window.location.search);
        
        // Error code mappings
        const errorCodes = {
            400: { 
                title: 'Bad Request', 
                message: 'The server could not understand the request. Please check your input and try again.',
                icon: 'fa-exclamation-circle'
            },
            401: { 
                title: 'Unauthorized', 
                message: 'You need to be authenticated to access this resource. Please log in and try again.',
                icon: 'fa-lock'
            },
            403: { 
                title: 'Forbidden', 
                message: 'You do not have permission to access this resource. Contact your administrator if you believe this is an error.',
                icon: 'fa-ban'
            },
            404: { 
                title: 'Page Not Found', 
                message: 'The requested resource could not be found. Please check the URL and try again.',
                icon: 'fa-search'
            },
            405: { 
                title: 'Method Not Allowed', 
                message: 'The HTTP method used is not supported for this endpoint.',
                icon: 'fa-ban'
            },
            408: { 
                title: 'Request Timeout', 
                message: 'The server timed out waiting for the request. Please try again.',
                icon: 'fa-clock-o'
            },
            429: { 
                title: 'Too Many Requests', 
                message: 'You have sent too many requests in a given amount of time. Please slow down and try again later.',
                icon: 'fa-hourglass-half'
            },
            500: { 
                title: 'Internal Server Error', 
                message: 'Something went wrong on our end. Our team has been notified. Please try again later.',
                icon: 'fa-bug'
            },
            502: { 
                title: 'Bad Gateway', 
                message: 'The server received an invalid response from the upstream server. Please try again later.',
                icon: 'fa-exchange'
            },
            503: { 
                title: 'Service Unavailable', 
                message: 'The server is temporarily unable to handle the request. Please try again later.',
                icon: 'fa-wrench'
            },
            504: { 
                title: 'Gateway Timeout', 
                message: 'The upstream server failed to respond in time. Please try again later.',
                icon: 'fa-clock-o'
            }
        };

        // Get error parameters from URL or use defaults
        let code = urlParams.get('code') || urlParams.get('error') || '404';
        let title = urlParams.get('title');
        let message = urlParams.get('message');
        let details = urlParams.get('details');
        let path = urlParams.get('path') || window.location.pathname;
        let requestId = urlParams.get('request_id') || generateRequestId();

        // Validate code
        if (!errorCodes[code]) {
            code = '404';
        }

        const info = errorCodes[code];

        // Update DOM elements
        document.getElementById('errorCode').textContent = code;
        document.getElementById('errorTitle').textContent = title || info.title;
        
        let finalMessage = message || info.message;
        if (code === '404' && path !== '/' && path !== '') {
            finalMessage += `\n\nPath: ${path}`;
        }
        document.getElementById('errorMessage').textContent = finalMessage;
        
        // Update icon
        const iconEl = document.querySelector('.error-icon i');
        if (iconEl) {
            iconEl.className = `fa ${info.icon}`;
        }
        
        // Set timestamp
        document.getElementById('timestamp').innerHTML = `Error at: ${new Date().toLocaleString()}`;
        
        // Set request ID
        document.getElementById('requestId').innerHTML = `Request ID: ${requestId}`;

        // Handle details display
        if (details) {
            document.getElementById('errorDetails').textContent = details;
            document.getElementById('traceLink').style.display = 'inline-block';
        }

        // Get stored error from sessionStorage (for client-side errors)
        const storedError = sessionStorage.getItem('nullname_last_error');
        if (storedError && !details) {
            try {
                const errorData = JSON.parse(storedError);
                document.getElementById('errorDetails').textContent = JSON.stringify(errorData, null, 2);
                document.getElementById('traceLink').style.display = 'inline-block';
                sessionStorage.removeItem('nullname_last_error');
            } catch(e) {}
        }

        // Auto-redirect for 401 Unauthorized
        if (code === '401') {
            setTimeout(() => {
                window.location.href = '/login';
            }, 3000);
        }

        // Generate random request ID
        function generateRequestId() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Toggle error details visibility
        document.getElementById('traceLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            const detailsDiv = document.getElementById('errorDetails');
            const link = e.currentTarget;
            if (detailsDiv.style.display === 'none' || detailsDiv.style.display === '') {
                detailsDiv.style.display = 'block';
                link.innerHTML = '<i class="fa fa-code"></i> Hide Details';
            } else {
                detailsDiv.style.display = 'none';
                link.innerHTML = '<i class="fa fa-code"></i> Show Details';
            }
        });

        // Log error to console
        console.error(`[Error ${code}] ${title || info.title}: ${message || info.message}`);
        if (details) console.error('Details:', details);

        // Add keyboard shortcut for retry (Ctrl+R or Cmd+R)
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'r') {
                e.preventDefault();
                location.reload();
            }
        });

        // Add copy error info functionality
        const copyInfo = async () => {
            const errorInfo = {
                code: code,
                title: title || info.title,
                message: message || info.message,
                path: path,
                timestamp: new Date().toISOString(),
                requestId: requestId,
                userAgent: navigator.userAgent
            };
            try {
                await navigator.clipboard.writeText(JSON.stringify(errorInfo, null, 2));
                showToast('Error info copied to clipboard');
            } catch(e) {}
        };

        // Show toast message
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: var(--bg-panel);
                backdrop-filter: blur(20px);
                border: 1px solid var(--accent-primary);
                border-radius: var(--radius-md);
                padding: 0.5rem 1rem;
                color: var(--accent-primary);
                font-size: 0.75rem;
                z-index: 3000;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
</body>
</html>
