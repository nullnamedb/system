<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullName DB - Error</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/ui/base.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 1rem;
        }
        .error-container {
            max-width: 500px;
            padding: 2rem;
        }
        .error-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-error));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }
        .error-message {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }
        .error-details {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 2rem;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: left;
            overflow-x: auto;
            display: none;
        }
        .error-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .error-footer {
            border-top: 1px solid var(--border-primary);
            padding-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.75rem;
        }
        .trace-link {
            cursor: pointer;
            color: var(--accent-primary);
            font-size: 0.8rem;
        }
        @media (max-width: 480px) {
            .error-code { font-size: 4rem; }
            .error-icon { font-size: 3rem; }
            .error-actions { flex-direction: column; }
            .error-actions .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon" id="errorIcon">
            <i class="fa fa-exclamation-triangle"></i>
        </div>
        <div class="error-code" id="errorCode">404</div>
        <div class="error-title" id="errorTitle">Page Not Found</div>
        <div class="error-message" id="errorMessage">The page you are looking for does not exist.</div>
        <div class="error-details" id="errorDetails"></div>
        <div class="error-actions">
            <a href="/dashboard" class="btn btn-primary"><i class="fa fa-home"></i> Dashboard</a>
            <button onclick="history.back()" class="btn"><i class="fa fa-arrow-left"></i> Go Back</button>
            <button onclick="location.reload()" class="btn"><i class="fa fa-refresh"></i> Retry</button>
        </div>
        <div class="error-footer">
            <span id="timestamp"></span><br>
            <a href="#" class="trace-link" id="traceLink" style="display:none;"><i class="fa fa-code"></i> Show Details</a><br>
            <a href="/login">Return to Login</a> | <a href="https://github.com/nullnamedb" target="_blank">Report Issue</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const errorCodes = {
            '400': { title: 'Bad Request', message: 'The request could not be understood.', icon: 'fa-exclamation-circle' },
            '401': { title: 'Unauthorized', message: 'You need to be authenticated.', icon: 'fa-lock' },
            '403': { title: 'Forbidden', message: 'You do not have permission.', icon: 'fa-ban' },
            '404': { title: 'Page Not Found', message: 'The requested resource does not exist.', icon: 'fa-search' },
            '405': { title: 'Method Not Allowed', message: 'HTTP method not supported.', icon: 'fa-ban' },
            '408': { title: 'Request Timeout', message: 'The server timed out waiting.', icon: 'fa-clock-o' },
            '429': { title: 'Too Many Requests', message: 'Rate limit exceeded. Please slow down.', icon: 'fa-hourglass-half' },
            '500': { title: 'Internal Server Error', message: 'Something went wrong on our end.', icon: 'fa-bug' },
            '502': { title: 'Bad Gateway', message: 'Invalid response from upstream.', icon: 'fa-exchange' },
            '503': { title: 'Service Unavailable', message: 'Server temporarily unavailable.', icon: 'fa-wrench' },
            '504': { title: 'Gateway Timeout', message: 'Upstream server timeout.', icon: 'fa-clock-o' }
        };

        let code = urlParams.get('code') || urlParams.get('error') || '404';
        let title = urlParams.get('title');
        let message = urlParams.get('message');
        let details = urlParams.get('details');
        let path = urlParams.get('path') || window.location.pathname;

        if (!errorCodes[code]) code = '404';
        const info = errorCodes[code];

        document.getElementById('errorCode').textContent = code;
        document.getElementById('errorTitle').textContent = title || info.title;
        document.getElementById('errorMessage').textContent = (message || info.message) + (code === '404' && path !== '/' ? `\n\nPath: ${path}` : '');
        
        const iconEl = document.querySelector('.error-icon i');
        if (iconEl) iconEl.className = `fa ${info.icon}`;
        document.querySelector('.error-icon').className = `error-icon error-${code}`;

        if (details) {
            document.getElementById('errorDetails').textContent = details;
            document.getElementById('traceLink').style.display = 'inline-block';
        }

        document.getElementById('timestamp').textContent = `Error at: ${new Date().toLocaleString()}`;

        document.getElementById('traceLink')?.addEventListener('click', (e) => {
            e.preventDefault();
            const detailsDiv = document.getElementById('errorDetails');
            if (detailsDiv.style.display === 'none') {
                detailsDiv.style.display = 'block';
                e.target.innerHTML = '<i class="fa fa-code"></i> Hide Details';
            } else {
                detailsDiv.style.display = 'none';
                e.target.innerHTML = '<i class="fa fa-code"></i> Show Details';
            }
        });

        if (code === '401') setTimeout(() => window.location.href = '/login', 3000);
        console.error(`[Error ${code}] ${title || info.title}: ${message || info.message}`);
    </script>
</body>
</html>
