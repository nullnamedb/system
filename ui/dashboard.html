<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullName DB - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/ui/base.css">
    <style>
        .dashboard-container {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-primary);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-primary);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 700;
        }

        .logo i {
            color: var(--accent-primary);
            font-size: 1.5rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--accent-primary);
        }

        .nav-item.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--accent-primary);
            border-left: 2px solid var(--accent-primary);
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-primary);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg-primary);
            font-weight: bold;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-primary);
            padding: 0.75rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.25rem;
            cursor: pointer;
        }

        .format-selector {
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-md);
            padding: 0.4rem 0.75rem;
            color: var(--text-primary);
            font-size: 0.85rem;
        }

        .query-area {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-primary);
        }

        .query-input-container {
            background: var(--bg-input);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        textarea.query-input {
            width: 100%;
            min-height: 120px;
            background: none;
            border: none;
            padding: 1rem;
            color: var(--text-primary);
            font-family: var(--font-mono);
            font-size: 0.9rem;
            resize: vertical;
        }

        textarea.query-input:focus {
            outline: none;
        }

        .query-actions {
            padding: 0.75rem;
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-primary);
        }

        .results-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .results-header {
            padding: 0.75rem 1.5rem;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .results-content {
            flex: 1;
            overflow: auto;
            padding: 1rem;
        }

        .results-pre {
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            padding: 1rem;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-lg);
            padding: 1rem;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .status-bar {
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border-primary);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100%;
                transform: translateX(-100%);
                z-index: 1000;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .menu-toggle {
                display: block;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa fa-database"></i>
                    <span>NullName DB</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-item active" data-view="dashboard">
                    <i class="fa fa-tachometer"></i> Dashboard
                </div>
                <div class="nav-item" data-view="query">
                    <i class="fa fa-terminal"></i> Query Runner
                </div>
                <div class="nav-item" data-view="databases">
                    <i class="fa fa-database"></i> Databases
                </div>
                <div class="nav-item" data-view="files">
                    <i class="fa fa-file"></i> Files
                </div>
                <div class="nav-item" data-view="backups">
                    <i class="fa fa-archive"></i> Backups
                </div>
                <div class="nav-item" data-view="settings">
                    <i class="fa fa-cog"></i> Settings
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">G</div>
                    <div>
                        <div id="userName">Guest</div>
                        <div style="font-size: 0.7rem;" id="userRole">guest</div>
                    </div>
                </div>
                <button class="btn btn-sm" id="logoutBtn" style="width: 100%;">
                    <i class="fa fa-sign-out"></i> Logout
                </button>
                <div style="margin-top: 1rem; text-align: center;">
                    <a href="https://github.com/nullnamedb" target="_blank" style="color: var(--text-muted);">
                        <i class="fa fa-github"></i> nullnamedb
                    </a>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="top-bar">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fa fa-bars"></i>
                </button>
                <div class="top-bar-actions">
                    <select id="formatSelect" class="format-selector">
                        <option value="json">JSON</option>
                        <option value="text">Plain Text</option>
                        <option value="table">Table</option>
                        <option value="csv">CSV</option>
                    </select>
                    <button class="btn btn-sm" id="refreshBtn">
                        <i class="fa fa-refresh"></i>
                    </button>
                </div>
            </div>

            <div id="dashboardView" style="flex: 1; overflow: auto; padding: 1.5rem;">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="statDatabases">-</div><div class="stat-label">Databases</div></div>
                    <div class="stat-card"><div class="stat-value" id="statTables">-</div><div class="stat-label">Tables</div></div>
                    <div class="stat-card"><div class="stat-value" id="statRecords">-</div><div class="stat-label">Records</div></div>
                    <div class="stat-card"><div class="stat-value" id="statStorage">-</div><div class="stat-label">Storage (MB)</div></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value" id="statQueries">-</div><div class="stat-label">Total Queries</div></div>
                    <div class="stat-card"><div class="stat-value" id="statSuccess">-</div><div class="stat-label">Success Rate</div></div>
                    <div class="stat-card"><div class="stat-value" id="statUptime">-</div><div class="stat-label">Uptime</div></div>
                    <div class="stat-card"><div class="stat-value" id="statVersion">-</div><div class="stat-label">Version</div></div>
                </div>
                <div style="background: var(--bg-card); border-radius: var(--radius-lg); padding: 1rem;">
                    <h4>Quick Start</h4>
                    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem;">
                        <button class="btn quick-query" data-query="get.">Show All Databases</button>
                        <button class="btn quick-query" data-query="status">System Status</button>
                        <button class="btn quick-query" data-query="help">Help</button>
                    </div>
                </div>
            </div>

            <div id="queryView" style="display: none; flex-direction: column; flex: 1; overflow: hidden;">
                <div class="query-area">
                    <div class="query-input-container">
                        <textarea id="queryInput" class="query-input" placeholder='Enter your query here...&#10;&#10;Examples:&#10;• get.users&#10;• add.mydb.users.name.John&#10;• commit "my changes"&#10;• undo&#10;• f1'></textarea>
                        <div class="query-actions">
                            <button id="runQueryBtn" class="btn btn-primary"><i class="fa fa-play"></i> Run Query</button>
                            <button id="clearResultsBtn" class="btn"><i class="fa fa-eraser"></i> Clear</button>
                        </div>
                    </div>
                </div>
                <div class="results-area">
                    <div class="results-header">
                        <div class="results-stats" id="resultsStats">Ready</div>
                        <div><button id="copyResultsBtn" class="btn btn-sm"><i class="fa fa-copy"></i></button></div>
                    </div>
                    <div class="results-content"><pre class="results-pre" id="resultsPre">Run a query to see results...</pre></div>
                </div>
            </div>

            <div id="databasesView" style="display: none; flex: 1; overflow: auto; padding: 1.5rem;">
                <h3><i class="fa fa-database"></i> Databases</h3>
                <div id="databasesTree" style="margin-top: 1rem;"></div>
            </div>

            <div id="filesView" style="display: none; flex: 1; overflow: auto; padding: 1.5rem;">
                <h3><i class="fa fa-file"></i> Uploaded Files</h3>
                <div id="filesList" style="margin-top: 1rem;"></div>
            </div>

            <div id="backupsView" style="display: none; flex: 1; overflow: auto; padding: 1.5rem;">
                <h3><i class="fa fa-archive"></i> Backups</h3>
                <button id="createBackupBtn" class="btn btn-primary" style="margin: 1rem 0;"><i class="fa fa-plus"></i> Create Backup</button>
                <div id="backupsList"></div>
            </div>

            <div id="settingsView" style="display: none; flex: 1; overflow: auto; padding: 1.5rem;">
                <h3><i class="fa fa-cog"></i> Settings</h3>
                <div style="max-width: 600px;">
                    <div style="margin-bottom: 1rem;"><label>Default Format</label><select id="settingsFormat" class="form-control" style="width:100%;padding:0.5rem;"><option value="json">JSON</option><option value="text">Text</option><option value="table">Table</option><option value="csv">CSV</option></select></div>
                    <div style="margin-bottom: 1rem;"><label>Theme</label><select id="settingsTheme" class="form-control" style="width:100%;padding:0.5rem;"><option value="dark">Dark</option><option value="light">Light</option></select></div>
                    <button id="saveSettingsBtn" class="btn btn-primary">Save Settings</button>
                </div>
            </div>

            <div class="status-bar"><span id="statusMsg"><i class="fa fa-circle" style="color: var(--accent-success); font-size: 0.6rem;"></i> Connected</span><span id="timeMsg"></span></div>
        </main>
    </div>

    <script src="/ui/session.js"></script>
    <script src="/ui/base.js"></script>
    <script src="/ui/app.js"></script>
</body>
</html>
