<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NullName DB - SQL Runner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="/ui/base.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e27;
            color: #e0e0e0;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: rgba(10, 14, 39, 0.95);
            border-right: 1px solid rgba(255,255,255,0.08);
            padding: 1.5rem 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            font-size: 1.25rem;
            background: linear-gradient(135deg, #00d2ff, #00ff88);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-item {
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #aaa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(0, 210, 255, 0.1);
            color: #00d2ff;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 1.5rem;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00d2ff, #00ff88);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .logout-btn {
            background: rgba(255,0,127,0.2);
            border: 1px solid #ff007f;
            color: #ff007f;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
        }

        .card {
            background: rgba(20, 25, 50, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sql-editor {
            width: 100%;
            min-height: 200px;
            background: #0a0e27;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e0e0e0;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
        }

        .sql-editor:focus {
            outline: none;
            border-color: #00d2ff;
        }

        .action-bar {
            display: flex;
            gap: 0.75rem;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d2ff, #00ff88);
            border: none;
            color: #0a0e27;
            font-weight: 600;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,210,255,0.3);
        }

        .results-container {
            overflow-x: auto;
            margin-top: 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th, .data-table td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .data-table th {
            color: #00d2ff;
            font-weight: 600;
            background: rgba(0, 210, 255, 0.05);
        }

        .data-table tr:hover {
            background: rgba(0, 210, 255, 0.05);
        }

        .query-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-size: 0.85rem;
            color: #888;
        }

        .error-message {
            background: rgba(255,0,127,0.1);
            border: 1px solid #ff007f;
            color: #ff007f;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .success-message {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
        }

        .query-history {
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .history-item:hover {
            background: rgba(0, 210, 255, 0.1);
        }

        .format-selector {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e0e0e0;
            padding: 0.5rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .status-success { background: rgba(0,255,136,0.2); color: #00ff88; }
        .status-error { background: rgba(255,0,127,0.2); color: #ff007f; }
        .status-running { background: rgba(0,210,255,0.2); color: #00d2ff; }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                margin-left: 0;
            }
            .menu-toggle {
                display: block;
                position: fixed;
                top: 1rem;
                left: 1rem;
                z-index: 101;
                background: #00d2ff;
                border: none;
                padding: 0.5rem;
                border-radius: 8px;
                cursor: pointer;
            }
        }

        @media (min-width: 769px) {
            .menu-toggle {
                display: none;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #00d2ff;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .split-view {
            display: flex;
            gap: 1rem;
        }

        .split-left {
            flex: 2;
        }

        .split-right {
            flex: 1;
        }

        @media (max-width: 900px) {
            .split-view {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <button class="menu-toggle" id="menuToggle"><i class="fa fa-bars"></i></button>

    <div class="app-container">
        <div class="sidebar" id="sidebar">
            <div class="logo">
                <h1><i class="fa fa-database"></i> NullName DB</h1>
            </div>
            <nav>
                <div class="nav-item" data-page="dashboard"><i class="fa fa-tachometer"></i> Dashboard</div>
                <div class="nav-item" data-page="databases"><i class="fa fa-database"></i> Databases</div>
                <div class="nav-item active" data-page="sql"><i class="fa fa-code"></i> SQL Runner</div>
                <div class="nav-item" data-page="nosql"><i class="fa fa-file-code-o"></i> NoSQL</div>
                <div class="nav-item" data-page="filebase"><i class="fa fa-file"></i> FileBase</div>
                <div class="nav-item" data-page="backup"><i class="fa fa-archive"></i> Backups</div>
                <div class="nav-item" data-page="settings"><i class="fa fa-cog"></i> Settings</div>
            </nav>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <h2 class="page-title">SQL Query Runner</h2>
                <div class="user-info">
                    <span id="username">Guest</span>
                    <div class="user-avatar" id="userAvatar">G</div>
                    <button class="logout-btn" id="logoutBtn"><i class="fa fa-sign-out"></i> Logout</button>
                </div>
            </div>

            <div class="split-view">
                <div class="split-left">
                    <div class="card">
                        <div class="card-title">
                            SQL Editor
                            <select id="formatSelect" class="format-selector">
                                <option value="json">JSON</option>
                                <option value="table">Table</option>
                                <option value="csv">CSV</option>
                                <option value="markdown">Markdown</option>
                            </select>
                        </div>
                        <textarea id="sqlEditor" class="sql-editor" placeholder="-- Write your SQL query here
-- Examples:
-- SELECT * FROM users
-- SELECT name, email FROM users WHERE age > 18
-- INSERT INTO users (name, email) VALUES ('John', 'john@email.com')
-- UPDATE users SET age = 26 WHERE id = 1
-- DELETE FROM users WHERE id = 3"></textarea>
                        <div class="action-bar">
                            <button class="btn btn-primary" id="runBtn"><i class="fa fa-play"></i> Run (Ctrl+Enter)</button>
                            <button class="btn" id="clearBtn"><i class="fa fa-eraser"></i> Clear</button>
                            <button class="btn" id="formatBtn"><i class="fa fa-magic"></i> Format</button>
                            <button class="btn" id="saveQueryBtn"><i class="fa fa-save"></i> Save</button>
                            <button class="btn" id="explainBtn"><i class="fa fa-info-circle"></i> Explain</button>
                        </div>
                        <div id="queryStatus"></div>
                    </div>
                </div>

                <div class="split-right">
                    <div class="card">
                        <div class="card-title">
                            Saved Queries
                            <button class="btn btn-sm" id="refreshHistoryBtn"><i class="fa fa-refresh"></i></button>
                        </div>
                        <div id="savedQueries" class="query-history">
                            <p style="color:#888; text-align:center; padding:1rem;">No saved queries</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Query Results</div>
                <div id="resultsArea" class="results-container">
                    <p style="color:#888; text-align:center; padding:2rem;">Run a query to see results</p>
                </div>
                <div id="queryInfo" class="query-info"></div>
            </div>
        </div>
    </div>

    <script src="/ui/session.js"></script>
    <script>
        const sessionMgr = window.sessionManager;
        let currentSession = null;
        let savedQueries = [];

        async function init() {
            await checkAuth();
            loadSavedQueries();
            attachEvents();
            setupKeyboardShortcuts();
        }

        async function checkAuth() {
            const session = localStorage.getItem('nullname_session');
            if (!session) { window.location.href = '/login'; return; }
            currentSession = session;
            try {
                const res = await fetch(`/q?q=status&ses=${session}`);
                const data = await res.json();
                if (data.status !== 'online') { window.location.href = '/login'; }
                else {
                    document.getElementById('username').innerText = 'admin';
                    document.getElementById('userAvatar').innerText = 'A';
                }
            } catch(e) { window.location.href = '/login'; }
        }

        function loadSavedQueries() {
            try {
                const saved = localStorage.getItem('nullname_saved_queries');
                if (saved) {
                    savedQueries = JSON.parse(saved);
                    renderSavedQueries();
                }
            } catch(e) {}
        }

        function saveQueryToStorage() {
            localStorage.setItem('nullname_saved_queries', JSON.stringify(savedQueries));
            renderSavedQueries();
        }

        function renderSavedQueries() {
            const container = document.getElementById('savedQueries');
            if (!savedQueries.length) {
                container.innerHTML = '<p style="color:#888; text-align:center; padding:1rem;">No saved queries</p>';
                return;
            }
            let html = '';
            for (let i = 0; i < savedQueries.length; i++) {
                const q = savedQueries[i];
                html += `<div class="history-item" data-index="${i}">
                    <div><strong>${escapeHtml(q.name)}</strong></div>
                    <div style="font-size:0.7rem; color:#666;">${escapeHtml(q.query.substring(0, 50))}${q.query.length > 50 ? '...' : ''}</div>
                    <div style="font-size:0.7rem; margin-top:0.25rem;">
                        <span class="status-badge status-success" onclick="event.stopPropagation(); loadQuery(${i})">Load</span>
                        <span class="status-badge status-error" onclick="event.stopPropagation(); deleteQuery(${i})">Delete</span>
                    </div>
                </div>`;
            }
            container.innerHTML = html;
            document.querySelectorAll('.history-item').forEach(item => {
                item.addEventListener('click', () => {
                    const idx = parseInt(item.dataset.index);
                    loadQuery(idx);
                });
            });
        }

        function loadQuery(index) {
            const query = savedQueries[index].query;
            document.getElementById('sqlEditor').value = query;
            showStatus('Query loaded', 'success');
        }

        function deleteQuery(index) {
            savedQueries.splice(index, 1);
            saveQueryToStorage();
            showStatus('Query deleted', 'success');
        }

        function saveCurrentQuery() {
            const query = document.getElementById('sqlEditor').value.trim();
            if (!query) { showStatus('Nothing to save', 'error'); return; }
            const name = prompt('Enter query name:', 'Query ' + (savedQueries.length + 1));
            if (!name) return;
            savedQueries.unshift({ name: name, query: query, savedAt: new Date().toISOString() });
            if (savedQueries.length > 20) savedQueries.pop();
            saveQueryToStorage();
            showStatus('Query saved', 'success');
        }

        async function runQuery() {
            const query = document.getElementById('sqlEditor').value.trim();
            if (!query) { showStatus('Enter a query', 'error'); return; }
            
            const format = document.getElementById('formatSelect').value;
            const startTime = Date.now();
            
            showStatus('Running query...', 'running');
            document.getElementById('resultsArea').innerHTML = '<div style="text-align:center;padding:2rem;"><div class="loading"></div><p style="margin-top:1rem;">Executing...</p></div>';
            
            try {
                let url = `/q?q=sql ${encodeURIComponent(query)}&ses=${currentSession}`;
                if (format !== 'json') url += `&format=${format}`;
                
                const res = await fetch(url);
                const elapsed = Date.now() - startTime;
                
                if (format === 'table' || format === 'markdown' || format === 'csv') {
                    const text = await res.text();
                    if (format === 'markdown') {
                        document.getElementById('resultsArea').innerHTML = `<pre style="background:#0a0e27; padding:1rem; border-radius:8px; overflow-x:auto;">${escapeHtml(text)}</pre>`;
                    } else {
                        document.getElementById('resultsArea').innerHTML = `<pre style="background:#0a0e27; padding:1rem; border-radius:8px; overflow-x:auto; font-family:monospace;">${escapeHtml(text)}</pre>`;
                    }
                } else {
                    const data = await res.json();
                    displayResults(data, elapsed);
                }
                
                document.getElementById('queryInfo').innerHTML = `<span>⏱️ ${elapsed}ms</span><span>📊 ${data.rows?.length || data.count || 0} rows</span>`;
                showStatus('Query completed', 'success');
            } catch (error) {
                document.getElementById('resultsArea').innerHTML = `<div class="error-message"><i class="fa fa-exclamation-triangle"></i> ${escapeHtml(error.message)}</div>`;
                showStatus('Query failed: ' + error.message, 'error');
            }
        }

        function displayResults(data, elapsed) {
            if (data.error) {
                document.getElementById('resultsArea').innerHTML = `<div class="error-message"><i class="fa fa-exclamation-triangle"></i> ${escapeHtml(data.error)}</div>`;
                return;
            }
            
            if (data.rows && data.rows.length > 0) {
                const columns = data.columns || Object.keys(data.rows[0]);
                let html = '<table class="data-table"><thead><tr>';
                for (const col of columns) html += `<th>${escapeHtml(col)}</th>`;
                html += '</tr></thead><tbody>';
                
                for (const row of data.rows) {
                    html += '<tr>';
                    for (const col of columns) {
                        let val = row[col];
                        if (val === undefined || val === null) val = '-';
                        if (typeof val === 'object') val = JSON.stringify(val);
                        html += `<td>${escapeHtml(String(val).substring(0, 100))}${String(val).length > 100 ? '...' : ''}</td>`;
                    }
                    html += '</tr>';
                }
                html += '</tbody></table>';
                html += `<p style="margin-top:1rem; color:#888;">✅ ${data.rows.length} row(s) returned in ${elapsed}ms</p>`;
                document.getElementById('resultsArea').innerHTML = html;
            } else if (data.success) {
                document.getElementById('resultsArea').innerHTML = `<div class="success-message"><i class="fa fa-check-circle"></i> ${escapeHtml(data.message || 'Query executed successfully')}</div>`;
            } else {
                document.getElementById('resultsArea').innerHTML = `<pre style="background:#0a0e27; padding:1rem; border-radius:8px; overflow-x:auto;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
            }
        }

        async function explainQuery() {
            const query = document.getElementById('sqlEditor').value.trim();
            if (!query) { showStatus('Enter a query first', 'error'); return; }
            
            showStatus('Analyzing query plan...', 'running');
            try {
                const res = await fetch(`/q?q=explain ${encodeURIComponent(query)}&ses=${currentSession}`);
                const data = await res.json();
                document.getElementById('resultsArea').innerHTML = `<pre style="background:#0a0e27; padding:1rem; border-radius:8px; overflow-x:auto;">${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
                showStatus('Explain plan generated', 'success');
            } catch (error) {
                document.getElementById('resultsArea').innerHTML = `<div class="error-message">${escapeHtml(error.message)}</div>`;
                showStatus('Explain failed', 'error');
            }
        }

        function formatQuery() {
            const editor = document.getElementById('sqlEditor');
            let query = editor.value;
            query = query.toUpperCase()
                .replace(/SELECT/g, 'SELECT\n  ')
                .replace(/FROM/g, '\nFROM')
                .replace(/WHERE/g, '\nWHERE')
                .replace(/JOIN/g, '\n  JOIN')
                .replace(/ORDER BY/g, '\nORDER BY')
                .replace(/GROUP BY/g, '\nGROUP BY')
                .replace(/HAVING/g, '\nHAVING')
                .replace(/LIMIT/g, '\nLIMIT')
                .replace(/INSERT INTO/g, '\nINSERT INTO')
                .replace(/VALUES/g, '\nVALUES')
                .replace(/UPDATE/g, '\nUPDATE')
                .replace(/SET/g, '\nSET')
                .replace(/DELETE FROM/g, '\nDELETE FROM')
                .replace(/\s+/g, ' ')
                .trim();
            editor.value = query;
            showStatus('Query formatted', 'success');
        }

        function clearEditor() {
            document.getElementById('sqlEditor').value = '';
            showStatus('Editor cleared', 'success');
        }

        function showStatus(message, type) {
            const container = document.getElementById('queryStatus');
            const badgeClass = type === 'success' ? 'status-success' : (type === 'error' ? 'status-error' : 'status-running');
            container.innerHTML = `<span class="status-badge ${badgeClass}">${message}</span>`;
            setTimeout(() => {
                if (container.innerHTML.includes(message)) container.innerHTML = '';
            }, 3000);
        }

        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    runQuery();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    saveCurrentQuery();
                }
            });
        }

        async function logout() {
            try { await fetch(`/q?q=logout&ses=${currentSession}`); } catch(e) {}
            localStorage.removeItem('nullname_session');
            window.location.href = '/login';
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function attachEvents() {
            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('runBtn').addEventListener('click', runQuery);
            document.getElementById('clearBtn').addEventListener('click', clearEditor);
            document.getElementById('formatBtn').addEventListener('click', formatQuery);
            document.getElementById('saveQueryBtn').addEventListener('click', saveCurrentQuery);
            document.getElementById('explainBtn').addEventListener('click', explainQuery);
            document.getElementById('refreshHistoryBtn').addEventListener('click', () => renderSavedQueries());
            
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', () => {
                    const page = item.dataset.page;
                    if (page === 'dashboard') window.location.href = '/studio';
                    if (page === 'databases') window.location.href = '/studio/database.html';
                    if (page === 'nosql') window.location.href = '/studio/nosql.html';
                    if (page === 'filebase') window.location.href = '/studio/filebase.html';
                    if (page === 'backup') window.location.href = '/studio/backup.html';
                    if (page === 'settings') window.location.href = '/studio/settings.html';
                    if (page === 'sql') { /* already here */ }
                });
            });
            
            document.getElementById('menuToggle').addEventListener('click', () => {
                document.getElementById('sidebar').classList.toggle('open');
            });
        }

        window.loadQuery = loadQuery;
        window.deleteQuery = deleteQuery;

        init();
    </script>
</body>
</html>
